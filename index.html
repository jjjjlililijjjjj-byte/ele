    <script>
      // Aggressively clear all service workers and caches to fix "cannot open" issues on repeat visits
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister().then(function(boolean) {
                if (boolean) {
                  console.log('ServiceWorker unregistered');
                  // Optional: force reload if we found and removed a worker
                  // window.location.reload();
                }
              });
            }
          });
        }

        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name).then(function() {
                console.log('Cache cleared:', name);
              });
            }
          });
        }
        
        // Clear session storage just in case it's holding broken state
        // sessionStorage.clear(); 
      })();

      // Patch console to prevent 'Converting circular structure to JSON' errors
      (function() {
        const originalError = console.error;
        const originalLog = console.log;
        const originalWarn = console.warn;

        function safeLog(method, args) {
          try {
            JSON.stringify(args); // Test for circular reference
            method.apply(console, args);
          } catch (e) {
            // If circular, log a safe message instead
            method.call(console, '[Circular Object Logged - Suppressed to prevent environment error]');
          }
        }

        console.error = function(...args) { safeLog(originalError, args); };
        console.log = function(...args) { safeLog(originalLog, args); };
        console.warn = function(...args) { safeLog(originalWarn, args); };
      })();
    </script>
