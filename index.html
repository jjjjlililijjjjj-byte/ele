    <script>
      // Patch console to prevent 'Converting circular structure to JSON' errors in the preview environment
      (function() {
        const originalError = console.error;
        const originalLog = console.log;
        const originalWarn = console.warn;

        function safeLog(method, args) {
          try {
            JSON.stringify(args); // Test for circular reference
            method.apply(console, args);
          } catch (e) {
            // If circular, log a safe message instead
            method.call(console, '[Circular Object Logged - Suppressed to prevent environment error]');
          }
        }

        console.error = function(...args) { safeLog(originalError, args); };
        console.log = function(...args) { safeLog(originalLog, args); };
        console.warn = function(...args) { safeLog(originalWarn, args); };
      })();
    </script>
