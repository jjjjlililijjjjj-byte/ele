    <script>
      // WeChat-specific fix: Force a clean state on every new session in WeChat
      (function() {
        const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
        const sessionKey = 'wechat_session_initialized';
        
        if (isWeChat && !sessionStorage.getItem(sessionKey)) {
          // First time in this WeChat session, clear everything and set flag
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
              for(let reg of regs) reg.unregister();
            });
          }
          if ('caches' in window) {
            caches.keys().then(names => {
              for (let name of names) caches.delete(name);
            });
          }
          localStorage.removeItem('elephant-slides-favorites'); // Optional: clear state if suspecting corruption
          sessionStorage.setItem(sessionKey, 'true');
          
          // Force a hard reload with a timestamp to bypass WeChat's internal cache
          const url = new URL(window.location.href);
          url.searchParams.set('t', Date.now());
          window.location.replace(url.toString());
          return;
        }

        // Standard aggressive clearing for all browsers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }

        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) {
              caches.delete(name);
            }
          });
        }
        // Handle back/forward navigation from cache (BFCache)
        window.addEventListener('pageshow', function(event) {
          if (event.persisted) {
            window.location.reload();
          }
        });
      })();

      // Patch console to prevent 'Converting circular structure to JSON' errors
      (function() {
        const originalError = console.error;
        const originalLog = console.log;
        const originalWarn = console.warn;

        function safeLog(method, args) {
          try {
            JSON.stringify(args); // Test for circular reference
            method.apply(console, args);
          } catch (e) {
            // If circular, log a safe message instead
            method.call(console, '[Circular Object Logged - Suppressed to prevent environment error]');
          }
        }

        console.error = function(...args) { safeLog(originalError, args); };
        console.log = function(...args) { safeLog(originalLog, args); };
        console.warn = function(...args) { safeLog(originalWarn, args); };
      })();
    </script>
